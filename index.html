<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NeuroKNOT — Mistral</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1976d2, #64b5f6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            height: 95vh;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .header {
            background: linear-gradient(135deg, #1976d2, #0d47a1);
            padding: 12px 16px;
        }
        .header h1 { color: white; font-size: 20px; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f5f7fb;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
        }
        .msg.user {
            background: #1976d2;
            color: white;
            align-self: flex-end;
        }
        .msg.bot {
            background: white;
            color: #333;
            align-self: flex-start;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            align-self: flex-start;
        }
        .typing span {
            width: 7px;
            height: 7px;
            background: #1976d2;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        .input-area {
            padding: 12px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        form { display: flex; gap: 8px; }
        input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
        }
        input:focus { border-color: #1976d2; }
        button {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: #1976d2;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .clear {
            background: none;
            border: none;
            color: #999;
            font-size: 11px;
            margin-top: 8px;
            width: 100%;
            cursor: pointer;
        }
        .welcome { text-align: center; padding: 30px 20px; color: #999; }
        .welcome h3 { color: #1976d2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NeuroKNOT</h1>
        </div>
        <div class="messages" id="messages">
            <div class="welcome"><h3>🤖 NeuroKNOT</h3><p>Напиши что-нибудь</p></div>
        </div>
        <div class="input-area">
            <form id="form">
                <input type="text" id="input" placeholder="Напишите сообщение..." autocomplete="off">
                <button type="submit">→</button>
            </form>
            <button class="clear" id="clearBtn">🗑️ Очистить</button>
        </div>
    </div>

    <script>
        // ==================== ТВОЙ MISTRAL API КЛЮЧ (ВСТАВЬ СЮДА) ====================
        const API_URL = 'https://api.mistral.ai/v1/chat/completions';
        const API_KEY = '4hXJsvEmR4AU7ezle3dNfLSft9GizPhm';
        
        const messagesDiv = document.getElementById('messages');
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const clearBtn = document.getElementById('clearBtn');

        let isWaiting = false;
        let conversationHistory = [];

        async function typeText(element, text, speed = 20) {
            element.textContent = '';
            for (let i = 0; i < text.length; i++) {
                element.textContent += text[i];
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                await new Promise(r => setTimeout(r, speed));
            }
        }

        function addMessage(text, isUser, save = true) {
            const welcome = messagesDiv.querySelector('.welcome');
            if (welcome) welcome.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${isUser ? 'user' : 'bot'}`;
            const contentDiv = document.createElement('div');
            const timeDiv = document.createElement('div');
            timeDiv.style.cssText = 'font-size:9px;margin-top:4px;text-align:right;opacity:0.7';
            timeDiv.textContent = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            msgDiv.appendChild(contentDiv);
            msgDiv.appendChild(timeDiv);
            messagesDiv.appendChild(msgDiv);
            
            if (isUser) {
                contentDiv.textContent = text;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } else {
                typeText(contentDiv, text, 15);
            }
            
            if (save && isUser) {
                conversationHistory.push({ role: 'user', content: text });
            } else if (save && !isUser) {
                conversationHistory.push({ role: 'assistant', content: text });
            }
        }

        function showTyping() {
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.id = 'typing';
            typing.innerHTML = '<span></span><span></span><span></span>';
            messagesDiv.appendChild(typing);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function clearHistory() {
            conversationHistory = [];
            messagesDiv.innerHTML = '';
            const welcome = document.createElement('div');
            welcome.className = 'welcome';
            welcome.innerHTML = '<h3>🤖 NeuroKNOT</h3><p>Напиши что-нибудь</p>';
            messagesDiv.appendChild(welcome);
        }

        async function sendToAI(message) {
            const messages = [
                { role: 'system', content: 'Ты NeuroKNOT — дружелюбный помощник. Отвечай кратко, по делу. Не пиши "давай подумаем" и подобное. Просто отвечай.' },
                ...conversationHistory.slice(-10),
                { role: 'user', content: message }
            ];
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'mistral-small-latest',
                        messages: messages,
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `Ошибка ${response.status}`);
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('API Error:', error);
                return `Ошибка: ${error.message}`;
            }
        }

        async function sendMessage() {
            if (isWaiting) return;
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            addMessage(text, true, true);
            
            isWaiting = true;
            showTyping();
            
            const response = await sendToAI(text);
            
            hideTyping();
            addMessage(response, false, true);
            isWaiting = false;
        }

        form.addEventListener('submit', (e) => { e.preventDefault(); sendMessage(); });
        clearBtn.addEventListener('click', clearHistory);
    </script>
</body>
</html>
