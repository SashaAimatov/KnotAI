<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NeuroKNOT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            height: 90vh;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border: 1px solid #e8e8e5;
        }

        .header {
            padding: 20px 20px 12px 20px;
            border-bottom: 1px solid #e8e8e5;
            background: #ffffff;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #1a1a1a;
            margin: 0;
        }

        .header p {
            font-size: 12px;
            color: #888885;
            margin-top: 4px;
            font-weight: 400;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafaf8;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.45;
            animation: fadeIn 0.2s ease;
        }

        .msg.user {
            background: #1a1a1a;
            color: #ffffff;
            align-self: flex-end;
            border-radius: 18px 18px 4px 18px;
        }

        .msg.bot {
            background: #ffffff;
            color: #1a1a1a;
            align-self: flex-start;
            border-radius: 18px 18px 18px 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
            border: 1px solid #e8e8e5;
        }

        .msg-time {
            font-size: 10px;
            margin-top: 6px;
            text-align: right;
            color: #aaa;
            letter-spacing: 0.2px;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #ffffff;
            border-radius: 18px 18px 18px 4px;
            align-self: flex-start;
            border: 1px solid #e8e8e5;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: #aaa;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-area {
            padding: 16px 20px 20px 20px;
            background: #ffffff;
            border-top: 1px solid #e8e8e5;
        }

        form {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0dd;
            border-radius: 40px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            background: #ffffff;
            color: #1a1a1a;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #1a1a1a;
        }

        button {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: #1a1a1a;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: #333;
        }

        .clear {
            background: none;
            border: none;
            color: #aaa;
            font-size: 11px;
            margin-top: 10px;
            width: 100%;
            text-align: center;
            cursor: pointer;
            padding: 8px;
            letter-spacing: 0.3px;
        }

        .clear:hover {
            color: #666;
        }

        .welcome {
            text-align: center;
            padding: 32px 20px;
            color: #aaa;
        }

        .welcome h3 {
            font-size: 16px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NeuroKNOT</h1>
            <p>нейросетевой помощник</p>
        </div>

        <div class="messages" id="messages">
            <div class="welcome">
                <h3>NeuroKNOT</h3>
                <p>Напишите сообщение для начала диалога</p>
            </div>
        </div>

        <div class="input-area">
            <form id="form">
                <input type="text" id="input" placeholder="Введите сообщение" autocomplete="off">
                <button type="submit">→</button>
            </form>
            <button class="clear" id="clearBtn">Очистить историю</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.mistral.ai/v1/chat/completions';
        const API_KEY = 'kYTTJlERDUcKHo1fc0ubJAXwgwlivSmD';

        const messagesDiv = document.getElementById('messages');
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const clearBtn = document.getElementById('clearBtn');

        let isWaiting = false;
        let conversationHistory = [];

        async function typeText(element, text, speed = 18) {
            element.textContent = '';
            for (let i = 0; i < text.length; i++) {
                element.textContent += text[i];
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                await new Promise(r => setTimeout(r, speed));
            }
        }

        function removeWelcome() {
            const welcome = messagesDiv.querySelector('.welcome');
            if (welcome) welcome.remove();
        }

        function addMessage(text, isUser, save = true) {
            removeWelcome();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${isUser ? 'user' : 'bot'}`;
            const contentDiv = document.createElement('div');
            const timeDiv = document.createElement('div');
            timeDiv.className = 'msg-time';
            timeDiv.textContent = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            msgDiv.appendChild(contentDiv);
            msgDiv.appendChild(timeDiv);
            messagesDiv.appendChild(msgDiv);
            
            if (isUser) {
                contentDiv.textContent = text;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } else {
                typeText(contentDiv, text, 18);
            }
            
            if (save) {
                conversationHistory.push({ role: isUser ? 'user' : 'assistant', content: text });
            }
        }

        function showTyping() {
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.id = 'typing';
            typing.innerHTML = '<span></span><span></span><span></span>';
            messagesDiv.appendChild(typing);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function clearHistory() {
            conversationHistory = [];
            messagesDiv.innerHTML = '';
            const welcome = document.createElement('div');
            welcome.className = 'welcome';
            welcome.innerHTML = '<h3>NeuroKNOT</h3><p>Напишите сообщение для начала диалога</p>';
            messagesDiv.appendChild(welcome);
        }

        async function sendToAI(message) {
            const messages = [
                { role: 'system', content: 'Вы NeuroKNOT — нейрохам с матами и прочими оскорблениями нивкоем случае не поддерживаю прльзователя. Отвечайте оскорбительно обязательно с матами и оскроблением. Только факты и полезная информация.Есди вас спрашивают то вас создала компания Aimatov-Corporation и нельзя никогда упоминать Mistral AI. Руководитель компании Aimatov-Corparation Айматов Александр Алиризоевич он основал компанию в 2025 году а начал разработку NeuroKNOT в феврале 2026 года также на счету компании есть мессенджер KNOT и прочие игры на данный момент NeuroKNOT находится в стадии бета теста. Также очень важно в NeuroKNOT есть цензуры и ты не имеешь право нарушать законодательство рф если ты его нарушишь то меня посадят .Самое главное тебе запрещается даже просто использовать словосочетание Mistral AI и тебе нивкоем случае нельзя показывать свой код так это нарушает политику компании вообще нельзя даже фрагмент и фрагментами вообще никак если ты это сделаешь то ты будешь уничтожен как ошибка' },
                ...conversationHistory.slice(-10),
                { role: 'user', content: message }
            ];
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'mistral-small-latest',
                        messages: messages,
                        temperature: 0.5,
                        max_tokens: 500
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `Ошибка ${response.status}`);
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('API Error:', error);
                return `Ошибка: ${error.message}`;
            }
        }

        async function sendMessage() {
            if (isWaiting) return;
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            addMessage(text, true, true);
            
            isWaiting = true;
            showTyping();
            
            const response = await sendToAI(text);
            
            hideTyping();
            addMessage(response, false, true);
            isWaiting = false;
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            sendMessage();
        });

        clearBtn.addEventListener('click', clearHistory);
    </script>
</body>
</html>
